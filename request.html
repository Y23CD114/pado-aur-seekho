<!DOCTYPE html>
<html>
<head>
<title>Book Requests - Pado Aur Seekho</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("bg.jpg");
background-size:cover;
background-position:center;
}

/* NAVBAR */
nav{
background:#8bc34a;
padding:12px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

nav a{
color:white;
margin:0 20px;
font-weight:bold;
text-decoration:none;
}

#userInfo{
position:absolute;
right:20px;
color:white;
font-weight:bold;
}

/* TITLE */
.title-box{
width:50%;
margin:40px auto;
text-align:center;
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
color:white;
font-size:36px;
font-weight:bold;
}

/* CONTAINER */
.container{
width:90%;
margin:20px auto;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#8bc34a;
color:white;
}

/* STATUS COLORS */
.pending{color:orange;font-weight:bold;}
.approved{color:green;font-weight:bold;}
.rejected{color:red;font-weight:bold;}

button{
padding:6px 10px;
margin:3px;
border:none;
border-radius:4px;
cursor:pointer;
}

.approveBtn{background:#4caf50;color:white;}
.rejectBtn{background:#f44336;color:white;}
.disabledBtn{background:gray;color:white;cursor:not-allowed;}

footer{
text-align:center;
padding:12px;
color:white;
position:fixed;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<div class="title-box">Book Requests (Librarian Panel)</div>

<nav>

<a href="home.html">Home</a>
<a href="books.html">Books</a>
<a href="return.html">Return Books</a>
<a href="request.html">Requests</a>

<span id="userInfo"></span>

</nav>

<div class="container">

<table id="requestTable">

<tr>
<th>Student ID</th>
<th>Books</th>
<th>Issue Date</th>
<th>Return Date</th>
<th>Status</th>
<th>Action</th>
</tr>

</table>

</div>

<footer>
© 2026 Pado Aur Seekho Library
</footer>

<script>

/* ===== LOGIN CHECK ===== */

var user = JSON.parse(localStorage.getItem("user"));

if(!user){
window.location.href="index.html";
}

if(user.role !== "Librarian"){
alert("Access denied. Librarian only.");
window.location.href="home.html";
}

/* PROFILE */

document.getElementById("userInfo").innerHTML =
`👤 ${user.role}: ${user.name}
 | <a href="#" onclick="logout()" style="color:white;">Logout</a>`;

/* LOGOUT */

function logout(){

if(confirm("Are you sure you want to log out?")){

localStorage.removeItem("user");

window.location.href="index.html";

}

}

/* ===== LOAD DATA ===== */

var table=document.getElementById("requestTable");

var requests =
JSON.parse(localStorage.getItem("bookRequests")) || [];

if(requests.length===0){

table.innerHTML+=`
<tr>
<td colspan="6">No book requests yet.</td>
</tr>
`;

}

/* DISPLAY REQUESTS */

requests.forEach((req,index)=>{

let statusClass="pending";
if(req.status==="Approved") statusClass="approved";
if(req.status==="Rejected") statusClass="rejected";

let buttons="";

if(req.status==="Pending"){

buttons=`
<button class="approveBtn"
onclick="approve(${index})">Approve</button>

<button class="rejectBtn"
onclick="reject(${index})">Reject</button>
`;

}else{

buttons=`<button class="disabledBtn">Completed</button>`;

}

table.innerHTML+=`
<tr>
<td>${req.student}</td>
<td>${req.books}</td>
<td>${req.issueDate}</td>
<td>${req.returnDate}</td>
<td class="${statusClass}">
${req.status}
</td>
<td>${buttons}</td>
</tr>
`;

});

/* ===== APPROVE REQUEST ===== */

function approve(i){

var books =
JSON.parse(localStorage.getItem("libraryBooks")) || [];

var bookIDs =
requests[i].books.split(",");

/* CHECK AVAILABILITY */

for(let id of bookIDs){

id=id.trim();

let book =
books.find(b => b.id === id);

if(!book || book.copies === 0){

alert("Cannot approve. Book not available: " + id);
return;

}

}

/* DECREASE COPIES */

for(let id of bookIDs){

id=id.trim();

let book =
books.find(b => b.id === id);

book.copies -= 1;

}

/* SAVE BOOKS */

localStorage.setItem(
"libraryBooks",
JSON.stringify(books)
);

/* UPDATE REQUEST */

requests[i].status="Approved";
requests[i].approvedBy=user.name;

/* SAVE REQUESTS */

localStorage.setItem(
"bookRequests",
JSON.stringify(requests)
);

alert("Request approved!");

location.reload();

}

/* ===== REJECT REQUEST ===== */

function reject(i){

requests[i].status="Rejected";
requests[i].approvedBy=user.name;

localStorage.setItem(
"bookRequests",
JSON.stringify(requests)
);

location.reload();

}

</script>

</body>
</html>
